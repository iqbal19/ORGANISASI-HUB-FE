<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#ffffff"/>
  
  <!-- Navbar -->
  <rect x="20" y="20" width="120" height="24" rx="4" fill="#047857"/>
  <rect x="240" y="25" width="40" height="10" rx="5" fill="#9ca3af"/>
  <rect x="300" y="25" width="40" height="10" rx="5" fill="#9ca3af"/>
  <rect x="360" y="25" width="40" height="10" rx="5" fill="#9ca3af"/>
  <rect x="480" y="20" width="100" height="24" rx="12" fill="#047857"/>

  <!-- Hero Section -->
  <circle cx="500" cy="150" r="100" fill="#ecfdf5"/>
  <rect x="40" y="100" width="300" height="32" rx="4" fill="#064e3b"/>
  <rect x="40" y="140" width="200" height="16" rx="4" fill="#6b7280"/>
  <rect x="40" y="164" width="240" height="16" rx="4" fill="#6b7280"/>
  <rect x="40" y="200" width="120" height="32" rx="16" fill="#047857"/>

  <!-- Content Section -->
  <rect x="40" y="280" width="240" height="100" rx="12" fill="#f9fafb" stroke="#f3f4f6"/>
  <rect x="60" y="300" width="160" height="12" rx="4" fill="#9ca3af"/>
  <rect x="60" y="320" width="120" height="12" rx="4" fill="#d1d5db"/>

  <rect x="300" y="280" width="240" height="100" rx="12" fill="#f9fafb" stroke="#f3f4f6"/>
  <rect x="320" y="300" width="160" height="12" rx="4" fill="#9ca3af"/>
  <rect x="320" y="320" width="120" height="12" rx="4" fill="#d1d5db"/>
</svg>
