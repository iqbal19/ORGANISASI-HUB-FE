<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc"/>
  
  <!-- Navbar -->
  <rect x="0" y="0" width="600" height="40" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="20" y="10" width="100" height="20" rx="4" fill="#1e40af"/>
  <rect x="380" y="15" width="40" height="10" rx="5" fill="#cbd5e1"/>
  <rect x="440" y="15" width="40" height="10" rx="5" fill="#cbd5e1"/>
  <rect x="500" y="10" width="80" height="20" rx="10" fill="#1e40af"/>

  <!-- Hero Section -->
  <rect x="0" y="40" width="600" height="160" fill="#eff6ff"/>
  <rect x="100" y="80" width="400" height="24" rx="4" fill="#1e3a8a"/>
  <rect x="150" y="116" width="300" height="12" rx="4" fill="#94a3b8"/>
  <rect x="180" y="136" width="240" height="12" rx="4" fill="#94a3b8"/>
  
  <!-- Content Cards -->
  <rect x="40" y="240" width="160" height="120" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="60" y="260" width="120" height="60" rx="4" fill="#e2e8f0"/>
  <rect x="60" y="330" width="80" height="10" rx="4" fill="#94a3b8"/>

  <rect x="220" y="240" width="160" height="120" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="240" y="260" width="120" height="60" rx="4" fill="#e2e8f0"/>
  <rect x="240" y="330" width="80" height="10" rx="4" fill="#94a3b8"/>

  <rect x="400" y="240" width="160" height="120" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="420" y="260" width="120" height="60" rx="4" fill="#e2e8f0"/>
  <rect x="420" y="330" width="80" height="10" rx="4" fill="#94a3b8"/>
</svg>
